[settings]
env_file = ".env.local"

# Shortcuts for the most common workflows.
[shell_alias]
dev = "mise tasks run dev"
up = "mise tasks run start"
down = "mise tasks run down"
help = "mise tasks run help"
init = "mise tasks run convex-init"

# Human-friendly help (grouped in scripts/mise/task.sh).
[tasks.help]
quiet = true
description = "Show task help and examples"
run = "scripts/mise/task.sh help"

# App/container workflows.
[tasks.build]
description = "Build the app container image (Docker or Podman)"
depends = ["_check-container-tool", "_check-compose-tool"]
run = "scripts/mise/task.sh build"

[tasks.run]
quiet = true
description = "Run the app container locally (Docker or Podman)"
depends = ["_check-env-file", "_check-compose-tool"]
run = "scripts/mise/task.sh run"

[tasks.rebuild]
description = "Build and run the app container locally (Docker or Podman)"
run = [
  { task = "build" },
  { task = "run" },
]

[tasks.run-dev]
quiet = true
description = "Run the app locally with hot reload (Convex local or cloud)"
depends = ["_check-env-file"]
run = "scripts/mise/task.sh run-dev"

[tasks._check-env-file]
quiet = true
description = "Validate local env file (.env.local) exists"
run = "scripts/mise/task.sh check-env-file"

[tasks._detect-container-tool]
quiet = true
description = "Print the selected container runtime binary (docker or podman)"
run = "scripts/mise/task.sh detect-container-tool"

[tasks._check-container-tool]
quiet = true
description = "Validate a supported container runtime is installed"
run = "scripts/mise/task.sh check-container-tool"

[tasks._detect-compose-tool]
quiet = true
description = "Print the compose command for the selected container runtime"
depends = ["_check-container-tool"]
run = "scripts/mise/task.sh detect-compose-tool"

[tasks._check-compose-tool]
quiet = true
description = "Validate compose tooling is available for the selected runtime"
run = "scripts/mise/task.sh check-compose-tool"

# Common workflows.
[tasks.dev]
description = "Start self-hosted Convex, then run the app locally with hot reload"
run = [
  { task = "convex-up" },
  { task = "run-dev" },
]

[tasks.start]
description = "Start self-hosted Convex, build the app image, and run the app container"
quiet = true
run = [
  { tasks = ["convex-up", "build"] },
  { task = "run" },
]

[tasks.down]
description = "Stop the app and self-hosted Convex containers"
quiet = true
run = [{ task = "convex-down" }]

# Convex workflows.
[tasks.convex-up]
description = "Start self-hosted Convex services (Postgres, backend, dashboard)"
quiet = true
depends = ["_check-compose-tool"]
run = "scripts/mise/task.sh convex-up"

[tasks._convex-up-postgres]
description = "Start the self-hosted Convex Postgres service"
quiet = true
depends = ["_check-compose-tool"]
run = "scripts/mise/task.sh convex-up-postgres"

[tasks._convex-up-backend]
description = "Start the self-hosted Convex backend service (and Postgres)"
quiet = true
depends = ["_check-compose-tool"]
run = "scripts/mise/task.sh convex-up-backend"

[tasks._convex-up-dashboard]
description = "Start the self-hosted Convex dashboard service"
quiet = true
depends = ["_check-compose-tool"]
run = "scripts/mise/task.sh convex-up-dashboard"

[tasks.convex-down]
description = "Stop self-hosted Convex containers (keep volumes)"
quiet = true
depends = ["_check-compose-tool"]
run = "scripts/mise/task.sh convex-down"

[tasks.convex-init]
description = "Bootstrap self-hosted Convex, save local env values, and configure Jira envs"
quiet = true
depends = ["_check-container-tool", "_check-compose-tool"]
run = "scripts/mise/task.sh convex-init"
